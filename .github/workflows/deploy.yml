name: Deploy to Dokku

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_KEY }}

      - name: Add Dokku host to known_hosts
        run: ssh-keyscan -H steve107.mikrus.xyz >> ~/.ssh/known_hosts

      - name: Push to Dokku (API)
        run: |
          git remote add dokku-api dokku@steve107.mikrus.xyz:course-provisioning-api
          git push dokku-api main:main --force

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_KEY }}

      - name: Add Dokku host to known_hosts
        run: ssh-keyscan -H steve107.mikrus.xyz >> ~/.ssh/known_hosts

      - name: Push to Dokku (Frontend)
        run: |
          git remote add dokku-frontend dokku@steve107.mikrus.xyz:course-provisioning-frontend
          git push dokku-frontend main:main --force
