name: Deploy to Dokku

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 10107 steve107.mikrus.xyz >> ~/.ssh/known_hosts

      - name: Deploy to Dokku
        run: |
          git remote add dokku-api ssh://dokku@steve107.mikrus.xyz:10107/course-provisioning-api
          git push dokku-api main

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 10107 steve107.mikrus.xyz >> ~/.ssh/known_hosts

      - name: Deploy to Dokku
        run: |
          git remote add dokku-frontend ssh://dokku@steve107.mikrus.xyz:10107/course-provisioning-frontend
          git push dokku-frontend main
